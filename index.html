<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グットクルー セトリビルダー</title>
<style>
  :root{
    --bg:#15121c;
    --panel:#1f1a29;
    --panel2:#241e30;
    --accent:#ff4f8b;
    --accent2:#ffd23f;
    --line:#352c44;
    --text:#f3eefc;
    --text-dim:#a89bc2;
    --used:#332940;
    --green:#54e0a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#1a1626;
    color:var(--text);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    min-height:100vh;
  }
  header{
    padding:28px 24px 18px;
    border-bottom:1px solid var(--line);
    background:radial-gradient(ellipse at top left, rgba(255,79,139,.18), transparent 60%);
  }
  header h1{
    margin:0 0 4px;
    font-size:22px;
    letter-spacing:.04em;
  }
  header h1 span{color:var(--accent);}
  header p{margin:0;color:var(--text-dim);font-size:13px;}

  .layout{
    display:flex;
    flex-direction:column;
    gap:18px;
    padding:18px;
    max-width:820px;
    margin:0 auto;
  }

  .panel{
    background:#1a1528;
    border:2px solid var(--line);
    border-radius:14px;
    padding:16px;
    box-shadow: 0 2px 16px rgba(0,0,0,.4);
  }
  .panel.panel-setlist{
    border-color:#ff4f8b;
    box-shadow: 0 2px 20px rgba(255,79,139,.15);
  }
  .panel.panel-songlist{
    border-color:#7b6fa0;
    box-shadow: 0 2px 20px rgba(123,111,160,.15);
  }
  .panel h2{
    margin:0 0 12px;
    font-size:14px;
    color:var(--accent2);
    letter-spacing:.05em;
    display:flex;align-items:center;justify-content:space-between;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
  }

  .controls{
    display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;
  }
  .controls label{font-size:12px;color:var(--text-dim);display:flex;flex-direction:column;gap:4px;}
  .controls input{
    background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    color:var(--text);padding:7px 9px;font-size:13px;width:110px;
  }

  .song-group{margin-bottom:10px;}
  .group-header{
    font-size:11px;color:var(--text-dim);letter-spacing:.04em;
    padding:4px 2px;display:flex;align-items:center;gap:6px;
  }
  .group-header .gline{flex:1;height:1px;background:var(--line);}
  .group-rows{display:flex;flex-direction:column;gap:5px;}

  .kikkake-select{
    background:var(--panel);border:1px solid var(--line);border-radius:6px;
    color:var(--text-dim);font-size:11px;padding:3px 4px;flex:0 0 auto;
  }
  .remark-input{
    background:var(--panel);border:1px solid var(--line);border-radius:6px;
    color:var(--text);font-size:11px;padding:3px 6px;flex:0 1 110px;width:110px;
  }
  .slot.fixed{
    border-style:solid;
    background:#241e30;
    opacity:.85;
  }
  .slot.fixed .idx{background:#5a4f72;}
  .slot[draggable="true"]{cursor:grab;}
  .slot[draggable="true"]:active{cursor:grabbing; opacity:.7; transform:scale(1.01);}
  .slot.drag-over{border-color:var(--accent2); background:rgba(255,210,63,.08);}
  .drag-handle{
    display:none;
    flex:0 0 auto;
    cursor:grab;
    color:var(--text-dim);
    font-size:16px;
    padding:2px 4px;
    touch-action:none;
    line-height:1;
    user-select:none;
  }
  .drag-handle:active{ cursor:grabbing; color:var(--accent2); }
  .lock-btn{
    background:none;border:none;cursor:pointer;
    font-size:14px;padding:1px 3px;flex:0 0 auto;opacity:.8;
  }
  .lock-btn:hover{ opacity:1; transform:scale(1.15); }
  @media (max-width:600px){
    .drag-handle{ display:flex; align-items:center; }
  }

  .song-list{
    display:flex;flex-direction:column;gap:6px;
    max-height:560px;overflow-y:auto;padding-right:4px;
  }
  .song-row{
    display:flex;align-items:center;gap:10px;
    background:var(--panel2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:9px 11px;
    cursor:pointer;
    transition:.15s;
  }
  .song-row:hover{border-color:var(--accent);}
  .song-row.used{
    background:var(--used);
    opacity:.5;
  }
  .song-row.used .song-title{ text-decoration:line-through; }
  .freq-dot{
    width:9px;height:9px;border-radius:50%;flex:0 0 auto;
  }
  .mc-time-input{
    background:var(--panel);border:1px solid var(--line);border-radius:6px;
    color:var(--accent2);font-size:11px;padding:2px 4px;width:52px;text-align:center;
  }
  .slot.optional-fixed{ opacity:.5; }
  .slot.optional-fixed .idx{ background:#5a4f72; }
  .slot.disabled-fixed .title{ text-decoration:line-through; color:var(--text-dim); }
  .toggle-fixed-btn{
    background:none;border:1px solid var(--line);color:var(--text-dim);
    border-radius:6px;font-size:10px;padding:2px 6px;cursor:pointer;flex:0 0 auto;
  }
  .toggle-fixed-btn.active{ border-color:var(--accent);color:var(--accent); }

  .song-main{flex:1;min-width:0;}
  .song-title{font-size:13.5px;font-weight:600;}
  .song-meta{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .song-time{font-size:12px;color:var(--accent2);flex:0 0 auto;}
  .badge-used{
    font-size:10px;background:var(--green);color:#0c2418;
    border-radius:6px;padding:2px 6px;flex:0 0 auto;
  }

  .setlist{
    display:flex;flex-direction:column;gap:6px;
    min-height:120px;
  }
  .empty{color:var(--text-dim);font-size:13px;text-align:center;padding:30px 0;}
  .slot{
    display:flex;align-items:center;gap:10px;
    background:var(--panel2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:9px 11px;
  }
  .slot.mc{ border-style:dashed; }
  .slot .idx{
    width:22px;height:22px;border-radius:50%;
    background:var(--accent);color:#fff;
    font-size:11px;font-weight:700;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  }
  .slot.mc .idx{background:var(--text-dim);color:#1f1a29;}
  .slot .title{flex:1;font-size:13.5px;}
  .slot .time{font-size:12px;color:var(--accent2);}
  .slot button{
    background:none;border:none;color:var(--text-dim);
    font-size:15px;cursor:pointer;line-height:1;padding:2px 4px;
  }
  .slot button:hover{color:var(--accent);}

  .summary{
    margin-top:14px;padding-top:12px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;
    font-size:13px;
  }
  .summary .total{font-size:18px;font-weight:700;}
  .summary .ok{color:var(--green);}
  .summary .ng{color:var(--accent);}

  .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  button.btn{
    background:var(--accent);color:#fff;border:none;border-radius:8px;
    padding:9px 14px;font-size:12.5px;font-weight:600;cursor:pointer;
  }
  button.btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line);}
  button.btn:hover{filter:brightness(1.08);}

  textarea#output, textarea#textOutput{
    width:100%;min-height:220px;background:var(--panel2);
    border:1px solid var(--line);border-radius:10px;color:var(--text);
    padding:10px;font-size:12.5px;line-height:1.6;white-space:pre;
    font-family:"SF Mono",Consolas,monospace;
  }

  .legend{display:flex;gap:14px;font-size:11px;color:var(--text-dim);margin-bottom:10px;flex-wrap:wrap;}
  .legend span{display:flex;align-items:center;gap:5px;}
  .legend .dot{width:8px;height:8px;border-radius:50%;}

  .setlist-doc{
    background:#fff;color:#111;border-radius:10px;padding:16px;
    font-size:12px;
  }
  .doc-date{text-align:right;font-size:11px;margin-bottom:4px;}
  .doc-title{
    text-align:center;font-weight:800;font-size:20px;
    background:#111;color:#fff;padding:6px 0;letter-spacing:.1em;margin-bottom:8px;
  }
  table.doc-head{width:100%;border-collapse:collapse;margin-bottom:10px;}
  table.doc-head td{border:1px solid #999;padding:5px 8px;font-size:11px;}
  table.doc-head td.lbl{background:#eee;font-weight:700;width:90px;}
  table.doc-table{width:100%;border-collapse:collapse;table-layout:fixed;}
  table.doc-table tr{height:28px;}
  table.doc-table th, table.doc-table td{
    border:1px solid #999;padding:3px 4px;font-size:8.5px;text-align:left;
    vertical-align:middle;
    white-space:nowrap;overflow:hidden;text-overflow:clip;
    max-width:0;
  }
  table.doc-table th{background:#222;color:#fff;text-align:center;font-size:8px;}
  /* 列幅: タイトルを広めに確保 */
  table.doc-table td.num, table.doc-table th:nth-child(1){text-align:center;width:16px;background:#f4f4f4;font-weight:700;}
  table.doc-table th:nth-child(2), table.doc-table td.ttl{width:24%;font-weight:600;}
  table.doc-table th:nth-child(3), table.doc-table td:nth-child(3){width:9%;text-align:center;}
  table.doc-table th:nth-child(4), table.doc-table td:nth-child(4){width:8%;text-align:center;}
  table.doc-table th:nth-child(5), table.doc-table td.onkyo{width:16%;}
  table.doc-table th:nth-child(6), table.doc-table td.light{width:14%;}
  table.doc-table th:nth-child(7), table.doc-table td.remark{width:18%;}
  /* 音響要望・照明要望・備考のみ折り返し許可 */
  table.doc-table td.onkyo, table.doc-table td.light, table.doc-table td.remark{
    white-space:normal;overflow:hidden;font-size:7.5px;line-height:1.3;
  }
  .doc-total{
    margin-top:10px;text-align:right;font-size:14px;font-weight:800;
  }
  .doc-mic{ margin-top:18px; text-align:center; }
  .doc-mic img{ width:100%; max-width:100%; border-radius:6px; }
  .doc-footer{
    margin-top:14px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px;
    border-top:2px solid #111; padding-top:10px;
  }
  .doc-footer-spacer{ width:1px; }
  .doc-thanks{ font-size:16px; font-weight:800; text-align:center; }
  .doc-logo-img{ height:46px; width:auto; justify-self:end; }

  .setlist-doc, .setlist-doc *{
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
    color-adjust:exact;
  }

  /* ===== スマホ対応 ===== */
  @media (max-width:600px){
    header{ padding:16px 14px 12px; }
    header h1{ font-size:17px; }
    .layout{ padding:10px; gap:12px; }
    .panel{ padding:12px; border-radius:10px; }
    .panel h2{ font-size:13px; }
    .controls{ gap:8px; }
    .controls label{ font-size:11px; }
    .controls input{ font-size:12px; padding:6px 8px; width:90px; }
    .song-list{ max-height:400px; }
    .song-row{ padding:8px 10px; gap:8px; }
    .song-title{ font-size:13px; }
    .group-header{ font-size:11px; }
    .slot{ padding:8px 9px; gap:7px; flex-wrap:wrap; }
    .slot .title{ font-size:12.5px; min-width:0; flex:1 1 120px; }
    .slot .idx{ width:20px; height:20px; font-size:10px; flex-shrink:0; }
    .slot .time{ font-size:11px; }
    .kikkake-select{ font-size:11px; padding:3px 2px; }
    .remark-input{ width:80px; font-size:10px; }
    .summary{ font-size:12px; }
    .summary .total{ font-size:16px; }
    .actions{ gap:6px; }
    button.btn{ padding:8px 10px; font-size:12px; }
    .slot button{ font-size:14px; padding:2px 6px; }
    .mc-time-input{ width:60px !important; }
  }

  @media print{
    @page{ size:A4 portrait; margin:10mm; }
    html, body{
      margin:0; padding:0;
      height:auto !important;
      overflow:hidden !important;
    }
    header, .panel > h2, .controls, .actions, .song-list, .summary, #printBtn,
    .setlist, .panel:nth-of-type(2), #textOutputWrap{ display:none !important; }
    body{ background:#fff; }
    .panel{ border:none; padding:0; }
    .layout{
      padding:0; max-width:100%;
      height:auto !important;
      overflow:hidden !important;
    }
    .setlist-doc{
      border-radius:0; padding:0;
      page-break-after:avoid;
      break-after:avoid;
    }
    .setlist-doc *{
      page-break-inside:avoid;
      break-inside:avoid;
    }
  }
</style>
</head>
<body>

<header>
  <h1><span>グットクルー</span> セトリビルダー</h1>
  <p>採用済み楽曲はグレーアウト表示。出演枠タイムに合わせてセトリを組み立てます。</p>
</header>

<div class="layout">

  <!-- 上：セトリ構築 -->
  <div class="panel panel-setlist">
    <div class="controls">
      <label>日付
        <input type="date" id="eventDate">
      </label>
      <label>会場名（任意）
        <input type="text" id="venueName" placeholder="○○HALL" style="width:150px;">
      </label>
      <label>イベント名（任意）
        <input type="text" id="eventName" placeholder="○○vol.1" style="width:150px;">
      </label>
      <label>出演時間（分）
        <input type="number" id="targetMin" value="25" min="1">
      </label>
      <label>MC回数
        <input type="number" id="mcCount" value="1" min="0" style="width:70px;">
      </label>
      <label>マイク本数
        <input type="text" id="micCount" value="6本" style="width:80px;">
      </label>
      <label>音出し
        <input type="text" id="onkyoMethod" value="PC" style="width:80px;">
      </label>
      <label>出力端子
        <input type="text" id="outputJack" value="キャノン" style="width:100px;">
      </label>
    </div>
    <div class="controls">
      <label style="flex:1;">音響・照明への要望（任意）
        <textarea id="generalRequest" style="width:100%;min-height:50px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:7px 9px;font-size:13px;font-family:inherit;resize:vertical;">中音はオケよりもボーカルを若干あげてください</textarea>
      </label>
    </div>
    <div class="actions" style="margin-top:0;">
      <button class="btn" id="autoGenBtn">★ おすすめセトリを自動生成</button>
      <button class="btn secondary" id="textInputToggleBtn">📝 テキスト入力</button>
    </div>

    <div id="textInputWrap" style="margin-top:10px;display:none;">
      <textarea id="textInput" placeholder="曲名を1行に1曲ずつ入力してください（MCを入れたい場所には「MC」とだけ書いてください）&#10;例）&#10;やるときやるガール！&#10;グッモーニン☆ジャンキー&#10;MC&#10;グッとくるサマー" style="min-height:140px;"></textarea>
      <div class="actions" style="margin-top:8px;">
        <button class="btn" id="buildFromTextBtn">このリストでセトリを作成</button>
      </div>
      <div id="textInputWarning" style="font-size:11px;color:var(--accent);margin-top:6px;"></div>
    </div>

    <h2 style="margin-top:18px;">セットリスト</h2>
    <div class="setlist" id="setlist"></div>

    <div class="summary">
      <div>目標 <b id="targetDisp">25:00</b> ／ 残り <span id="remain">25:00</span></div>
      <div class="total" id="totalTime">0:00</div>
    </div>

    <div class="actions">
      <button class="btn secondary" id="addMcBtn">＋ MCを追加</button>
      <button class="btn secondary" id="resetBtn">リセット</button>
      <button class="btn" id="genBtn">PDF出力</button>
      <button class="btn secondary" id="printBtn" style="display:none;">🖨 印刷／PDF保存</button>
      <button class="btn secondary" id="downloadPrintBtn" style="display:none;">⬇ 印刷用HTMLを保存</button>
      <button class="btn" id="textGenBtn">テキスト出力</button>
    </div>

    <div id="outputWrap" style="margin-top:14px;"></div>

    <div id="textOutputWrap" style="margin-top:14px;display:none;">
      <textarea id="textOutput" style="-webkit-user-select:text;user-select:text;"></textarea>
      <div class="actions" style="margin-top:8px;">
        <button class="btn secondary" id="copyTextBtn">📋 全選択してコピー</button>
      </div>
    </div>
  </div>

  <!-- 下：楽曲一覧 -->
  <div class="panel panel-songlist">
    <h2>楽曲一覧<span id="songCount" style="color:var(--text-dim);font-weight:400;"></span></h2>
    <div class="legend">
      <span><span class="dot" style="background:#ff4f8b"></span>メイン曲</span>
      <span><span class="dot" style="background:#7b6fa0"></span>変化球曲</span>
    </div>
    <div class="song-list" id="songList"></div>
  </div>

</div>

// イントロ/ドラムループ系を優先表示したい3曲のベース名
const PRIORITY_BASE = ["NEW AGE","触発エマージェンシー！","Because it!!"];

// 変化球曲として扱う基底タイトル（全バリエーションに適用）
const HENKYOKU_BASE = new Set(["NEW AGE","Because it!!","Raise the Sail","URAMESHIYA"]);

// 自動生成で採用確率0%（手動のみで使用可能）な曲の基底タイトル
const ZERO_PROB_BASE = new Set(["BRAVE","ESCAPE!","夢見がち Sound & Beat","Bye Bye Little Girl","フロントクラクション","ストレリチア"]);

// 変化球曲の採用確率（7%）
const HENKYOKU_PROB = 0.07;

function isHenkyoku(song){
  return HENKYOKU_BASE.has(baseTitle(song.t));
}

function isMain(song){
  // freqが3以上かつ変化球でない → メイン曲
  return song.freq >= 3 && !isHenkyoku(song);
}

function toSec(str){
  const [m,s] = str.split(":").map(Number);
  return m*60+s;
}
function toMMSS(sec){
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec/60), s = sec%60;
  return `${m}:${String(s).padStart(2,"0")}`;
}
// バリエーション同一曲判定用：タイトルから【ショート】や ドラムループ/ イントロ/ などを除いた基底名
function baseTitle(t){
  return t.replace(/ドラムループ\//,"").replace(/イントロ\//,"").replace(/【ショート】/,"").replace(/!+$/,"").trim();
}

let setlist = []; // {type:'song'|'mc', t, time(sec), id}
let mcCounter = 0;

let SE_SEC = 60;
let EXIT_MC_SEC = 30;
let seLocked = false;   // 手動設定時はtrue→逆算スキップ
let exitLocked = false;

function usedBaseTitles(){
  return new Set(setlist.filter(x=>x.type==='song').map(x=>baseTitle(x.t)));
}

function renderSongList(){
  const list = document.getElementById('songList');
  list.innerHTML = '';
  document.getElementById('songCount').textContent = ` (${DB.length}曲)`;
  const used = usedBaseTitles();

  // 基底タイトルごとにグループ化
  const groups = {};
  DB.forEach(song=>{
    const base = baseTitle(song.t);
    if(!groups[base]) groups[base] = [];
    groups[base].push(song);
  });
  const baseOrder = Object.keys(groups).sort((a,b)=>{
    const maxA = Math.max(...groups[a].map(s=>s.freq));
    const maxB = Math.max(...groups[b].map(s=>s.freq));
    return maxB - maxA;
  });

  // メイン曲・変化球曲に分けて表示
  const mainBases = baseOrder.filter(b=> !HENKYOKU_BASE.has(b) && Math.max(...groups[b].map(s=>s.freq)) >= 3);
  const henkyokuBases = baseOrder.filter(b=> HENKYOKU_BASE.has(b) || Math.max(...groups[b].map(s=>s.freq)) < 3);

  const renderGroup = (bases, sectionLabel, dotColor) => {
    const sec = document.createElement('div');
    sec.style.cssText = 'margin-bottom:14px;';
    sec.innerHTML = `<div style="font-size:11px;font-weight:700;color:${dotColor};letter-spacing:.05em;padding:4px 0 6px;display:flex;align-items:center;gap:6px;">
      <span style="width:8px;height:8px;border-radius:50%;background:${dotColor};display:inline-block;"></span>${sectionLabel}
    </div>`;
    bases.forEach(base=>{
      const variants = groups[base];
      const groupEl = document.createElement('div');
      groupEl.className = 'song-group';
      const isUsed = used.has(base);
      groupEl.innerHTML = `<div class="group-header">${base}${variants.length>1 ? `（${variants.length}バージョン）` : ''}<span class="gline"></span></div>`;
      const rows = document.createElement('div');
      rows.className = 'group-rows';
      variants.forEach(song=>{
        const row = document.createElement('div');
        row.className = 'song-row' + (isUsed ? ' used' : '');
        row.innerHTML = `
          <span class="freq-dot" style="background:${dotColor}"></span>
          <span class="song-main">
            <div class="song-title">${song.t}</div>
            <div class="song-meta">${song.time}</div>
          </span>
          ${isUsed ? '<span class="badge-used">採用済</span>' : ''}
        `;
        row.addEventListener('click', ()=>{
          if(isUsed) return;
          setlist.push({type:'song', t:song.t, time:toSec(song.time), light:song.light||'', onkyo:song.onkyo||'', kikkake:'音先', remark:'', id:Date.now()+Math.random()});
          renderAll();
        });
        rows.appendChild(row);
      });
      groupEl.appendChild(rows);
      sec.appendChild(groupEl);
    });
    list.appendChild(sec);
  };

  renderGroup(mainBases, 'メイン曲', '#ff4f8b');
  renderGroup(henkyokuBases, '変化球曲', '#7b6fa0');
}

let dragIndex = null;

function autoAbsorbRemainder(){
  const allMc = setlist.filter(x=>x.type==='mc');
  const freeMc = allMc.filter(x=>!x.locked); // 手動設定していないMCのみ
  if(freeMc.length===0) return;
  const targetMin = +document.getElementById('targetMin').value || 0;
  const targetSec = targetMin*60;

  const songSec = setlist.filter(x=>x.type==='song').reduce((a,b)=>a+b.time,0);
  const lockedMcSec = allMc.filter(x=>x.locked).reduce((a,b)=>a+b.time,0);
  const mcBudget = targetSec - getActiveSESec() - getActiveExitSec() - songSec - lockedMcSec;

  if(mcBudget <= 0){
    freeMc.forEach(mc=>{ mc.time = 30; });
    return;
  }

  const perMCRaw = Math.floor(mcBudget / freeMc.length);
  const perMC = Math.min(150, Math.max(60, perMCRaw));
  freeMc.forEach(mc=>{
    mc.time = perMC;
  });
}

let useStartSE = true;
let useExitMC = true;

function getActiveSESec(){ return useStartSE ? SE_SEC : 0; }
function getActiveExitSec(){ return useExitMC ? EXIT_MC_SEC : 0; }

  // 固定：登場SE（任意で削除可・時間手動入力可）

    <button class="toggle-fixed-btn${useStartSE?' active':''}" id="toggleSEBtn">${useStartSE?'使用中':'除外中'}</button>
  `;
  seSlot.querySelector('#toggleSEBtn').addEventListener('click', ()=>{
    useStartSE = !useStartSE;
    renderAll();
  });
  const seInput = seSlot.querySelector('#seTimeInput');
  seInput.addEventListener('click', e=> e.stopPropagation());
  seInput.addEventListener('change', (e)=>{
    const m = e.target.value.trim().match(/^(\d+):(\d{2})$/);
    if(m){ SE_SEC = +m[1]*60 + +m[2]; seLocked = true; renderAll(); }
    else { e.target.value = toMMSS(SE_SEC); }
  });
  box.appendChild(seSlot);

  if(setlist.length===0){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = '出演時間を入力して自動生成するか、下の楽曲をクリックして追加してください';
    box.appendChild(empty);
  } else {
    setlist.forEach((item, i)=>{
      const slot = document.createElement('div');
      slot.className = 'slot' + (item.type==='mc' ? ' mc' : '');
      slot.draggable = true;
      slot.dataset.i = i;
      const kikkakeHtml = item.type==='song' ? `
        <select class="kikkake-select" data-i="${i}">
          <option value="音先" ${item.kikkake==='音先'?'selected':''}>音先</option>
          <option value="曲振り" ${item.kikkake==='曲振り'?'selected':''}>曲振り</option>
          <option value="板付" ${item.kikkake==='板付'?'selected':''}>板付</option>
          <option value="" ${!item.kikkake?'selected':''}>―</option>
        </select>` : '';
      const remarkHtml = item.type==='song' ? `
        <input type="text" class="remark-input" data-i="${i}" placeholder="備考" value="${(item.remark||'').replace(/"/g,'&quot;')}">` : '';
      // MCは手動で時間を入力できるinputを表示
      const mcTimeHtml = item.type==='mc' ? `
        <input type="text" class="mc-time-input" data-i="${i}" value="${toMMSS(item.time)}" title="時間を手入力(例:2:30)">` : '';
      const label = item.type==='mc' ? 'MC' : item.t;
      const lockBtnHtml = (item.type==='mc' && item.locked) ? `
        <button class="lock-btn" data-i="${i}" title="タップで逆算に戻す">🔒</button>` : '';
      slot.innerHTML = `
        <span class="drag-handle" title="長押しして並び替え">⠿</span>
        <div class="idx">${i+1}</div>
        <div class="title">${label}</div>
        ${kikkakeHtml}
        ${remarkHtml}
        ${mcTimeHtml}
        ${lockBtnHtml}
        <div class="time">${item.type==='song'?toMMSS(item.time):''}</div>
        <button data-i="${i}" title="削除">×</button>
      `;
      // 削除ボタン
      slot.querySelector('button[title="削除"]').addEventListener('click', (e)=>{
        const idx = +e.target.dataset.i;
        setlist.splice(idx,1);
        renderAll();
      });
      // ロック解除ボタン
      const lockBtn = slot.querySelector('.lock-btn');
      if(lockBtn){
        lockBtn.addEventListener('click', (e)=>{
          e.stopPropagation();
          const idx = +e.target.dataset.i;
          setlist[idx].locked = false;
          renderAll();
        });
      }
      const sel = slot.querySelector('.kikkake-select');
      if(sel){
        sel.addEventListener('click', e=> e.stopPropagation());
        sel.addEventListener('change', (e)=>{
          const idx = +e.target.dataset.i;
          setlist[idx].kikkake = e.target.value;
        });
      }
      const remarkInput = slot.querySelector('.remark-input');
      if(remarkInput){
        remarkInput.addEventListener('click', e=> e.stopPropagation());
        remarkInput.addEventListener('input', (e)=>{
          const idx = +e.target.dataset.i;
          setlist[idx].remark = e.target.value;
        });
      }
      const mcInput = slot.querySelector('.mc-time-input');
      if(mcInput){
        mcInput.addEventListener('click', e=> e.stopPropagation());
        mcInput.addEventListener('change', (e)=>{
          const idx = +e.target.dataset.i;
          const val = e.target.value.trim();
          const m = val.match(/^(\d+):(\d{2})$/);
          if(m){
            setlist[idx].time = +m[1]*60 + +m[2];
            setlist[idx].locked = true; // 手動設定→逆算スキップ
            renderAll();
          } else {
            e.target.value = toMMSS(setlist[idx].time);
          }
        });
      }
      slot.addEventListener('dragstart', (e)=>{
        dragIndex = i;
        e.dataTransfer.effectAllowed = 'move';
      });
      slot.addEventListener('dragover', (e)=>{
        e.preventDefault();
        slot.classList.add('drag-over');
      });
      slot.addEventListener('dragleave', ()=> slot.classList.remove('drag-over'));
      slot.addEventListener('drop', (e)=>{
        e.preventDefault();
        slot.classList.remove('drag-over');
        const dropIndex = +slot.dataset.i;
        if(dragIndex===null || dragIndex===dropIndex) return;
        const moved = setlist.splice(dragIndex,1)[0];
        setlist.splice(dropIndex,0,moved);
        dragIndex = null;
        renderAll();
      });

      // タッチ操作での並び替え（ハンドルボタン限定）
      const handle = slot.querySelector('.drag-handle');
      if(handle){
        handle.addEventListener('touchstart', (e)=>{
          dragIndex = i;
          slot.classList.add('drag-over');
        }, {passive:true});
        handle.addEventListener('touchmove', (e)=>{
          e.preventDefault();
          const touch = e.touches[0];
          const el = document.elementFromPoint(touch.clientX, touch.clientY);
          const target = el && el.closest('.slot[data-i]');
          document.querySelectorAll('.slot.drag-over').forEach(s=> s !== slot && s.classList.remove('drag-over'));
          if(target && target !== slot) target.classList.add('drag-over');
        }, {passive:false});
        handle.addEventListener('touchend', (e)=>{
          slot.classList.remove('drag-over');
          const touch = e.changedTouches[0];
          const el = document.elementFromPoint(touch.clientX, touch.clientY);
          const target = el && el.closest('.slot[data-i]');
          document.querySelectorAll('.slot.drag-over').forEach(s=> s.classList.remove('drag-over'));
          if(target && dragIndex !== null){
            const dropIndex = +target.dataset.i;
            if(dropIndex !== dragIndex){
              const moved = setlist.splice(dragIndex,1)[0];
              setlist.splice(dropIndex,0,moved);
            }
          }
          dragIndex = null;
          renderAll();
        });
      }
      box.appendChild(slot);
    });
  }

  // 固定：退場MC（任意で削除可・時間手動入力可）
  const exitSlot = document.createElement('div');
  exitSlot.className = 'slot fixed' + (useExitMC ? '' : ' optional-fixed disabled-fixed');
  exitSlot.innerHTML = `
    <div class="idx">MC</div>

    else { e.target.value = toMMSS(EXIT_MC_SEC); }
  });
  box.appendChild(exitSlot);

  updateSummary();
}

function updateSummary(){
  const targetMin = +document.getElementById('targetMin').value || 0;
  const targetSec = targetMin*60;
  document.getElementById('targetDisp').textContent = toMMSS(targetSec);

  const songsAndMcSec = setlist.reduce((a,b)=>a+b.time,0);
  const total = getActiveSESec() + songsAndMcSec + getActiveExitSec();
  document.getElementById('totalTime').textContent = toMMSS(total);

  const remain = targetSec - total;
  const remainEl = document.getElementById('remain');
  remainEl.textContent = (remain<0?'-':'') + toMMSS(Math.abs(remain));
  if(remain < 0 || remain > 30){
    remainEl.className = 'ng';
  } else {
    remainEl.className = 'ok';
  }
}

// ベース名ごとに候補を組み立てる（通常版・PRIORITY版＋ショート版も含める）
function buildCandidatePool(){
  const groups = {};
  DB.forEach(song=>{
    const base = baseTitle(song.t);
    if(!groups[base]) groups[base] = [];
    groups[base].push(song);
  });

  const pool = [];
  Object.keys(groups).forEach(base=>{
    const variants = groups[base];
    // 通常版（またはPRIORITY版）を選ぶ
    let primary;
    if(PRIORITY_BASE.includes(base)){
      primary = variants.find(v=>v.t.startsWith('イントロ/')||v.t.startsWith('ドラムループ/')) || variants[0];
    } else {
      primary = variants.find(v=>!v.t.includes('【ショート】') && !v.t.startsWith('イントロ/') && !v.t.startsWith('ドラムループ/')) || variants[0];
    }
    pool.push({...primary, _base: base});

    // ショート版があれば別エントリとして追加（同一baseとしてマーク）
    const shorts = variants.filter(v=>
      v !== primary &&
      v.t.includes('【ショート】') &&
      !v.t.startsWith('イントロ/') &&
      !v.t.startsWith('ドラムループ/')
    );
    shorts.forEach(s=> pool.push({...s, _base: base}));
  });

  // 確率フィルタ
  const mainPool = pool.filter(s => isMain(s) && !ZERO_PROB_BASE.has(s._base));
  const henkyokuPool = pool.filter(s => isHenkyoku(s) && !ZERO_PROB_BASE.has(s._base));

  // メイン曲はランダムシャッフル（均等確率）
  for(let i = mainPool.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [mainPool[i], mainPool[j]] = [mainPool[j], mainPool[i]];
  }

  // 変化球曲は7%で候補入り
  const activeHenkyoku = henkyokuPool.filter(()=> Math.random() < HENKYOKU_PROB);

  return [...mainPool, ...activeHenkyoku];
}

function autoGenerate(){
  const targetMin = +document.getElementById('targetMin').value || 0;
  const targetSec = targetMin*60;
  const mcCount = Math.max(0, Math.floor(+document.getElementById('mcCount').value || 0));
  const MC_TARGET = 120; // MCの目標時間(秒) = 約2分
  const MC_MIN = 60;    // 最短1分
  const MC_MAX = 150;   // 最長2分30秒
  const budget = targetSec - getActiveSESec() - getActiveExitSec();
  const reserve = mcCount * MC_TARGET; // MC分を約2分で確保

  const pool = buildCandidatePool();
  const selected = [];
  const usedBases = new Set(); // 同一曲の重複防止
  let runningSec = 0;

  pool.forEach(song=>{
    const base = song._base || baseTitle(song.t);
    if(usedBases.has(base)) return; // 同一曲の別バリエーションはスキップ
    if(selected.length===0 && (song.t.startsWith('イントロ/')||song.t.startsWith('ドラムループ/'))){
      return;
    }
    const sec = toSec(song.time);
    if(runningSec + sec <= budget - reserve){
      selected.push({type:'song', t:song.t, time:sec, light:song.light||'', onkyo:song.onkyo||'', kikkake:'音先', remark:'', id:Date.now()+Math.random()});
      usedBases.add(base);
      runningSec += sec;
    }
  });

  // MC時間を60〜150秒の範囲に収める
  const mcTotal = Math.max(0, budget - runningSec);
  const perMCRaw = mcCount > 0 ? Math.floor(mcTotal / mcCount) : 0;
  const perMC = Math.min(MC_MAX, Math.max(MC_MIN, perMCRaw));

  setlist = [];

  if(mcCount > 0 && selected.length > 0){
    const mcTimes = Array.from({length:mcCount}, ()=> perMC);
    // 曲をmcCount+1個のセグメントに均等配置
    const segments = mcCount + 1;
    const base2 = Math.floor(selected.length / segments);
    let extra = selected.length % segments;
    let songIdx = 0;
    for(let seg=0; seg<segments; seg++){
      let count = base2 + (seg < extra ? 1 : 0);
      for(let k=0;k<count;k++){
        setlist.push(selected[songIdx++]);
      }
      if(seg < mcCount){
        setlist.push({type:'mc', t:'MC', time:mcTimes[seg], id:Date.now()+Math.random()});
      }
    }
  } else {
    setlist = selected;
  }

  renderAll();
}

function renderAll(){
  renderSongList();
  renderSetlist();
}

// DB検索用：表記ゆれを吸収して曲を探す（イントロ/ドラムループ/ショートなどのバリエーションを正しく判定）
function findSongByText(text){
  const raw = text.trim();
  if(!raw) return null;
  const clean = raw.replace(/\s+/g,'');

  // 1. 完全一致
  let song = DB.find(s => s.t.replace(/\s+/g,'') === clean);
  if(song) return song;

  // 2. ベースタイトルが一致する候補の中から、入力文中のキーワードでバリエーションを判定
  const cleanBase = baseTitle(clean);
  const candidates = DB.filter(s => baseTitle(s.t) === cleanBase);
  if(candidates.length){
    const wantsShort = /ショート|short/i.test(raw);
    const wantsIntro = /イントロ|intro/i.test(raw);
    const wantsLoop  = /ドラムループ|drumloop|loop/i.test(raw);
    const pick = candidates.find(s=>{
      const isShort = s.t.includes('【ショート】');
      const isIntro = s.t.startsWith('イントロ/');
      const isLoop  = s.t.startsWith('ドラムループ/');
      if(wantsIntro) return isIntro && (wantsShort ? isShort : !isShort);
      if(wantsLoop)  return isLoop  && (wantsShort ? isShort : !isShort);
      if(wantsShort) return isShort && !isIntro && !isLoop;
      return !isShort && !isIntro && !isLoop;
    });
    if(pick) return pick;
    return candidates[0];
  }

  // 3. 部分一致（最も文字数が長く一致する候補＝最も具体的なバリエーションを優先）
  const partial = DB.filter(s => {
    const st = s.t.replace(/\s+/g,'');
    return st.includes(clean) || clean.includes(st);
  });
  if(partial.length){
    partial.sort((a,b)=> b.t.replace(/\s+/g,'').length - a.t.replace(/\s+/g,'').length);
    return partial[0];
  }
  return null;
}

// 「曲名　きっかけ」のように、きっかけ列を含む行からタイトル部分のみを取り出す
function extractTitleAndKikkake(line){
  const KIKKAKE_WORDS = ['音先','曲振り','板付'];
  // タブ・全角スペース・連続半角スペースで区切られた末尾トークンがきっかけ語かどうか判定
  const parts = line.split(/[\t　]+|\s{2,}/).map(p=>p.trim()).filter(p=>p.length>0);
  if(parts.length >= 2 && KIKKAKE_WORDS.includes(parts[parts.length-1])){
    return { title: parts.slice(0, -1).join(' '), kikkake: parts[parts.length-1] };
  }
  return { title: line, kikkake: null };
}

document.getElementById('buildFromTextBtn').addEventListener('click', ()=>{
  const raw = document.getElementById('textInput').value;
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const newSetlist = [];
  const notFound = [];
  const usedBase = new Set();

  lines.forEach(line=>{
    if(/^MC\b/i.test(line)){
      // 「MC」や「MC 2:00」のような行に対応
      const m = line.match(/(\d+):(\d{2})/);
      const time = m ? (+m[1]*60 + +m[2]) : 120;
      newSetlist.push({type:'mc', t:'MC', time, id:Date.now()+Math.random()});
      return;
    }
    const { title, kikkake } = extractTitleAndKikkake(line);
    const song = findSongByText(title);
    if(!song){
      notFound.push(line);
      return;
    }
    const base = baseTitle(song.t);
    if(usedBase.has(base)){
      return; // 同一曲のバリエーション重複はスキップ
    }
    usedBase.add(base);
    newSetlist.push({
      type:'song', t:song.t, time:toSec(song.time),
      light:song.light||'', onkyo:song.onkyo||'', kikkake: kikkake || '音先', remark:'',
      id:Date.now()+Math.random()
    });
  });

  setlist = newSetlist;
  const warnEl = document.getElementById('textInputWarning');
  warnEl.textContent = notFound.length
    ? `※以下は楽曲が見つかりませんでした：${notFound.join('、')}`
    : '';
  renderAll();
});

function escapeHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// セル内テキストが1行に収まるよう、はみ出す場合だけ自動でフォントサイズを縮小
// （音響要望・照明要望・備考は改行を許容するため対象外）
function autoFitTableText(){
  const cells = document.querySelectorAll('.doc-table td:not(.onkyo):not(.light):not(.remark), .doc-table th');
  cells.forEach(cell=>{
    let size = parseFloat(getComputedStyle(cell).fontSize);
    let guard = 0;
    while(cell.scrollWidth > cell.clientWidth + 1 && size > 6 && guard < 20){
      size -= 0.5;
      cell.style.fontSize = size + 'px';
      guard++;
    }
  });
}

// 印刷用の別ウィンドウ／ダウンロードHTML内でも、実際の表示幅に合わせて
// 文字サイズを再計算してからprint()するための埋め込み用スクリプト
const AUTOFIT_SCRIPT = `
function autoFitTableText(){
  var cells = document.querySelectorAll('.doc-table td:not(.onkyo):not(.light):not(.remark), .doc-table th');
  cells.forEach(function(cell){
    cell.style.fontSize = '';
    var size = parseFloat(getComputedStyle(cell).fontSize);
    var guard = 0;
    while(cell.scrollWidth > cell.clientWidth + 1 && size > 6 && guard < 30){
      size -= 0.5;
      cell.style.fontSize = size + 'px';
      guard++;
    }
  });
}
window.fitAndPrintReady = function(){ autoFitTableText(); };
`;

document.getElementById('printBtn').addEventListener('click', ()=>{
  const content = document.getElementById('outputWrap').innerHTML;
  if(!content.trim()){ return; }
  const styles = Array.from(document.querySelectorAll('style')).map(s=>s.outerHTML).join('\n');
  let win;
  try{
    win = window.open('', '_blank');
  }catch(e){
    win = null;
  }
  if(!win || win.closed || typeof win.closed === 'undefined'){
    alert('印刷用の新しいタブを開けませんでした。\n\nこの画面がブラウザに直接表示されている場合は、ブラウザのアドレスバー付近に出ているポップアップブロックの通知から「許可」を選んでもう一度お試しください。\n\nClaudeのチャット内プレビューで開いている場合は、一度ファイルをダウンロードしてブラウザで直接開いてからお試しください。');
    return;
  }
  win.document.open();
  win.document.write(`
    <!DOCTYPE html>
    <html lang="ja">
    <head>
      <meta charset="UTF-8">
      <title>セットリスト</title>
      ${styles}
      <style>
        body{ margin:0; padding:8px; background:#fff; height:auto !important; overflow:hidden !important; }
        html{ height:auto !important; overflow:hidden !important; }
      </style>
    </head>
    <body>${content}
    <script>${AUTOFIT_SCRIPT}<\/script>
    </body>
    </html>
  `);
  win.document.close();
  const runAndPrint = () => {
    try{ win.fitAndPrintReady && win.fitAndPrintReady(); }catch(e){}
    win.focus();
    win.print();
  };
  win.onload = runAndPrint;
  // onloadが発火しないケースに備えた保険
  setTimeout(runAndPrint, 700);
});

document.getElementById('downloadPrintBtn').addEventListener('click', ()=>{
  const content = document.getElementById('outputWrap').innerHTML;
  if(!content.trim()){ return; }
  const styles = Array.from(document.querySelectorAll('style')).map(s=>s.outerHTML).join('\n');
  const fullHtml = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>セットリスト</title>
${styles}
<style>
  body{ margin:0; padding:8px; background:#fff; height:auto !important; overflow:hidden !important; }
  html{ height:auto !important; overflow:hidden !important; }
</style>
</head>
<body>${content}
<script>
${AUTOFIT_SCRIPT}
window.addEventListener('load', function(){ if(window.fitAndPrintReady) fitAndPrintReady(); });
<\/script>
</body>
</html>`;
  const blob = new Blob([fullHtml], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = document.getElementById('eventDate').value || 'setlist';
  a.download = `グットクルー_セトリ_${date}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert('印刷用HTMLをダウンロードしました。\nダウンロードしたファイルをブラウザで開き、ブラウザの印刷機能（Ctrl+P / Cmd+P）からPDF保存・印刷してください。');
});

document.getElementById('textGenBtn').addEventListener('click', ()=>{
  const date = document.getElementById('eventDate').value;
  const venue = document.getElementById('venueName').value.trim();
  const eventName = document.getElementById('eventName').value.trim();

  let lines = [];
  if(date){
    const parts = date.split('-');
    const m = parseInt(parts[1], 10);
    const d = parseInt(parts[2], 10);
    lines.push(`${m}/${d}`);
  }
  if(venue) lines.push(venue);
  if(eventName) lines.push(eventName);
  if(date || venue || eventName) lines.push('');

  if(useStartSE) lines.push(`SE　登場SE　${toMMSS(SE_SEC)}`);

  const circledNums = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
  let songNum = 1;
  setlist.forEach(item=>{
    if(item.type==='mc'){
      lines.push(''); // MC前に空行
      lines.push(`MC　${toMMSS(item.time)}`);
      lines.push(''); // MC後に空行
    } else {
      const num = songNum <= 20 ? circledNums[songNum-1] : songNum;
      lines.push(`${num}　${item.t}　${item.kikkake||'―'}`);
      songNum++;
    }
  });

  if(useExitMC) lines.push(`退場MC　${toMMSS(EXIT_MC_SEC)}`);
  const total = getActiveSESec() + setlist.reduce((a,b)=>a+b.time,0) + getActiveExitSec();
  lines.push('');
  lines.push(`合計タイム　${toMMSS(total)}`);

  document.getElementById('textOutput').value = lines.join('\n');
  document.getElementById('textOutputWrap').style.display = 'block';

  // テキストエリアを全選択状態にする
  const ta = document.getElementById('textOutput');
  setTimeout(()=>{
    ta.focus();
    ta.setSelectionRange(0, ta.value.length);
  }, 50);
});

document.getElementById('copyTextBtn').addEventListener('click', ()=>{
  const ta = document.getElementById('textOutput');
  const btn = document.getElementById('copyTextBtn');
  const text = ta.value;

  const showSuccess = () => {
    btn.textContent = '✓ コピーしました';
    setTimeout(()=> btn.textContent = '📋 全選択してコピー', 1800);
  };

  // 全選択
  ta.focus();
  ta.setSelectionRange(0, text.length);

  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(showSuccess).catch(()=>{
      try{ document.execCommand('copy'); showSuccess(); }catch(e){}
    });
  } else {
    try{ document.execCommand('copy'); showSuccess(); }catch(e){}
  }
});

renderAll();
